name: Stock Top Offset Analysis

on:
  schedule:
    # 美股收盘时间：美东时间 16:00 (东部时间 UTC-4/UTC-5)
    # 美股收盘后 1 小时 = 美东时间 17:00
    # 转换为 UTC 时间：21:00 或 22:00 (取决于夏令时)
    #  cron 格式：分 时 日 月 星期 (UTC 时间)
    # 只在美股交易日运行（周一到周五）
    - cron: '30 22 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: |
          mkdir -p output

      - name: Run stock analysis
        env:
          # 如果需要 AI 分析，在此添加 API Key
          # ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          TZ: America/New_York
        run: |
          # 获取当前日期（美国东部时间）
          DATE=$(TZ='America/New_York' date +%Y-%m-%d)
          echo "Running analysis for date: $DATE"
          # 运行主脚本并保存输出到 txt 文件
          python main.py --no-color 2>&1 | tee "output/${DATE}.txt"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and push to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ='America/New_York' date +%Y-%m-%d)

          # 创建或切换到 data 分支
          git fetch origin data:data 2>/dev/null || true
          git checkout -b data origin/data 2>/dev/null || git checkout -b data

          # 创建以日期命名的文件夹（年/月结构）
          YEAR=$(echo $DATE | cut -d'-' -f1)
          MONTH=$(echo $DATE | cut -d'-' -f2)
          mkdir -p "data/${YEAR}/${MONTH}"

          # 复制输出文件到数据目录
          cp "output/${DATE}.txt" "data/${YEAR}/${MONTH}/"

          # 提交并推送
          git add "data/${YEAR}/${MONTH}/${DATE}.txt"
          git commit -m "Add stock analysis for ${DATE}

          Auto-generated by GitHub Actions"
          git push -u origin data
